<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0a0a1a;
  --bg-card:     #0f1029;
  --bg-panel:    #111333;
  --bg-hover:    #161848;
  --bg-selected: #1a1d55;
  --cyan:        #00d4ff;
  --cyan-mid:    #00a8cc;
  --cyan-dim:    rgba(0,212,255,0.15);
  --violet:      #7b2fff;
  --violet-mid:  #a96fff;
  --violet-dim:  rgba(123,47,255,0.15);
  --text:        #e0e6ff;
  --text-mid:    #8892b4;
  --text-muted:  #525d80;
  --border:      rgba(0,212,255,0.12);
  --border-act:  rgba(0,212,255,0.4);
  --red:         #ff4d6a;
  --yellow:      #ffb84d;
  --green:       #00e676;
  --orange:      #ff8a3d;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.6);
  --glow-cyan:   0 0 12px rgba(0,212,255,0.3);
  --glow-violet: 0 0 12px rgba(123,47,255,0.3);
  --radius:      10px;
  --radius-sm:   6px;
  --tr:          180ms ease;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius: 2px; }

/* ── MATRIX BACKGROUND ── */
#matrixCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── LOCK SCREEN ── */
#lockScreen {
  position: fixed; inset: 0; z-index: 99999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 500ms ease;
}
#lockScreen.fade-out { opacity: 0; pointer-events: none; }

.lock-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%; max-width: 340px;
  box-shadow: var(--shadow-lg), var(--glow-cyan);
  display: flex; flex-direction: column; gap: 18px; align-items: center;
}

.lock-logo {
  font-size: 22px; font-weight: 700;
  color: var(--cyan);
  text-shadow: 0 0 12px rgba(0,212,255,0.5);
  letter-spacing: 1px;
}

.lock-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: -6px; }

.lock-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: inherit;
  font-size: 16px; padding: 12px 14px;
  outline: none; text-align: center; letter-spacing: 2px;
  transition: border-color var(--tr), box-shadow var(--tr);
}
.lock-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.15); }

.lock-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity var(--tr);
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  min-height: 44px;
}
.lock-btn:hover { opacity: 0.9; }
.lock-btn:active { opacity: 0.8; }

.lock-err { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }

/* ── HEADER ── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,16,41,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}

.app-title {
  font-size: 16px; font-weight: 700;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,212,255,0.4);
  letter-spacing: 0.3px;
}

.header-right { display: flex; gap: 8px; align-items: center; }

/* ── CLOCK ── */
.clock {
  font-size: 13px; font-weight: 600;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,212,255,0.5);
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
  margin-right: 12px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  color: var(--cyan);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--tr); white-space: nowrap;
  min-height: 44px;
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-act); box-shadow: var(--glow-cyan); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--cyan-mid), var(--violet));
  color: #fff; border-color: transparent;
}
.btn-primary:hover { opacity: 0.9; box-shadow: var(--glow-violet); }

.btn-ghost { background: transparent; border-color: rgba(224,230,255,0.1); color: var(--text-mid); }
.btn-ghost:hover { background: rgba(224,230,255,0.05); border-color: rgba(224,230,255,0.2); color: var(--text); }

.btn-danger { background: transparent; border-color: rgba(255,77,106,0.25); color: var(--red); }
.btn-danger:hover { background: rgba(255,77,106,0.08); border-color: var(--red); }

.btn-sm { padding: 6px 10px; font-size: 12px; min-height: 36px; }
.btn-icon { padding: 6px 10px; font-size: 15px; }

/* ── PROGRESS BAR ── */
.progress-wrap {
  position: relative; z-index: 9; flex-shrink: 0;
  background: rgba(15,16,41,0.8);
  border-bottom: 1px solid var(--border);
  padding: 6px 20px;
  display: flex; align-items: center; gap: 12px;
}
.progress-track {
  flex: 1; height: 4px;
  background: rgba(0,212,255,0.08);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--cyan), var(--violet));
  border-radius: 3px;
  transition: width 500ms ease;
  box-shadow: 0 0 6px rgba(0,212,255,0.4);
}
.progress-fill.all-done { background: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5); }
.progress-text {
  font-size: 11px; color: var(--text-muted);
  white-space: nowrap; min-width: 140px; text-align: right;
}

/* ── LAYOUT ── */
.app-body {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 1fr 320px;
  height: calc(100vh - 56px - 29px);
}

/* ── CALENDAR ── */
.cal-section { padding: 20px; overflow-y: auto; }

.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}

.cal-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  text-transform: capitalize;
  text-shadow: 0 0 6px rgba(0,212,255,0.15);
}

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }

.cal-weekday {
  text-align: center; font-size: 11px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;
  padding: 8px 0;
}

.cal-day {
  position: relative; aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid transparent; border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--tr);
  gap: 3px; min-height: 48px;
  background: var(--bg-card);
}
.cal-day:hover { background: var(--bg-hover); border-color: var(--border); }
.cal-day.other-month { opacity: 0.3; background: transparent; }
.cal-day.today {
  background: rgba(0,212,255,0.08);
  border-color: var(--cyan);
  box-shadow: inset 0 0 12px rgba(0,212,255,0.08);
}
.cal-day.today .cal-day-num { color: var(--cyan); font-weight: 700; }
.cal-day.selected {
  background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(123,47,255,0.2));
  border-color: var(--cyan);
  box-shadow: var(--glow-cyan);
}
.cal-day.selected .cal-day-num { color: #fff; font-weight: 700; }

.cal-day-num { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1; }

.cal-dots { display: flex; gap: 3px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }
.cal-dot.ev { background: var(--cyan); box-shadow: 0 0 4px rgba(0,212,255,0.5); }
.cal-dot.tk { background: var(--violet); box-shadow: 0 0 4px rgba(123,47,255,0.5); }
.cal-dot.od { background: var(--red); box-shadow: 0 0 4px rgba(255,77,106,0.5); }
.cal-day.selected .cal-dot { background: rgba(255,255,255,0.7); box-shadow: none; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}

.sidebar-hd { padding: 16px 14px 0; flex-shrink: 0; }

.side-date {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 2px; text-transform: capitalize;
}
.side-sub {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  min-height: 16px;
}

.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }

.tab-btn {
  flex: 1; padding: 10px;
  background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: inherit; font-size: 12px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  cursor: pointer; transition: all var(--tr); margin-bottom: -1px;
  min-height: 44px;
}
.tab-btn:hover { color: var(--text); background: rgba(0,212,255,0.03); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

.sidebar-body { flex: 1; overflow-y: auto; padding: 12px 12px 80px; }

.sidebar-add {
  position: sticky; bottom: 0;
  background: var(--bg-panel); padding: 10px 12px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-add .btn { width: 100%; justify-content: center; }

/* ── EMPTY / NO DAY ── */
.no-day, .empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 28px 12px; color: var(--text-muted); gap: 8px;
}
.no-day { height: 100%; }
.no-day-icon, .empty-icon { font-size: 32px; opacity: 0.3; }
.no-day-text, .empty-text { font-size: 13px; line-height: 1.6; }

/* ── EVENT CARD ── */
.event-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  border-radius: var(--radius);
  padding: 11px 12px; margin-bottom: 8px;
  cursor: pointer; transition: all var(--tr);
  position: relative; overflow: hidden;
}
.event-card:hover { border-color: var(--border-act); background: var(--bg-hover); box-shadow: var(--glow-cyan); }
.event-card.cat-lavoro    { border-left-color: var(--cyan); }
.event-card.cat-personale { border-left-color: var(--violet); }
.event-card.cat-salute    { border-left-color: var(--green); }
.event-card.cat-altro     { border-left-color: var(--orange); }

.ev-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ev-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ev-time  { font-size: 12px; color: var(--cyan); font-weight: 500; }

.badge {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.badge-lavoro    { background: rgba(0,212,255,0.12); color: var(--cyan); }
.badge-personale { background: rgba(123,47,255,0.15); color: var(--violet-mid); }
.badge-salute    { background: rgba(0,230,118,0.12); color: var(--green); }
.badge-altro     { background: rgba(255,138,61,0.12); color: var(--orange); }
.badge-rimandato { background: rgba(255,184,77,0.15); color: var(--yellow); border: 1px solid rgba(255,184,77,0.25); }

.card-actions {
  position: absolute; top: 8px; right: 8px;
  display: flex; gap: 3px;
  opacity: 0; transition: opacity var(--tr);
}
.event-card:hover .card-actions,
.task-card:hover  .card-actions { opacity: 1; }

.icon-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 13px; padding: 4px 6px;
  border-radius: 4px; transition: all var(--tr); line-height: 1;
  min-width: 28px; min-height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover     { color: var(--cyan); background: rgba(0,212,255,0.08); }
.icon-btn.del:hover { color: var(--red); background: rgba(255,77,106,0.08); }

/* ── TASK CARD ── */
.task-filters { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }

.filter-pill {
  padding: 5px 12px;
  border: 1px solid rgba(224,230,255,0.1);
  border-radius: 20px; background: transparent;
  color: var(--text-muted);
  font-family: inherit; font-size: 11px; font-weight: 600;
  letter-spacing: 0.6px; text-transform: uppercase;
  cursor: pointer; transition: all var(--tr);
  min-height: 32px;
}
.filter-pill:hover { border-color: var(--border-act); color: var(--text); }
.filter-pill.active {
  background: linear-gradient(135deg, var(--cyan-mid), var(--violet));
  border-color: transparent; color: #fff;
}

.task-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 12px; margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: all var(--tr); position: relative;
}
.task-card:hover { border-color: var(--border-act); }
.task-card.overdue   { border-color: rgba(255,77,106,0.3);  background: rgba(255,77,106,0.04); }
.task-card.due-today { border-color: rgba(255,184,77,0.3);  background: rgba(255,184,77,0.04); }
.task-card.done      { opacity: 0.45; }
.task-card.done .tk-title { text-decoration: line-through; color: var(--text-muted); }

.task-check {
  width: 20px; height: 20px; flex-shrink: 0;
  border: 2px solid var(--border-act); border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--tr); margin-top: 1px;
  min-width: 20px; min-height: 20px;
}
.task-check:hover { border-color: var(--cyan); background: rgba(0,212,255,0.1); }
.task-check.checked {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  border-color: transparent;
}
.task-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

.tk-body  { flex: 1; min-width: 0; }
.tk-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; transition: color var(--tr); }
.tk-meta  { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

.prio {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.prio-alta  { background: rgba(255,77,106,0.12); color: var(--red);    border: 1px solid rgba(255,77,106,0.2); }
.prio-media { background: rgba(255,184,77,0.12); color: var(--yellow); border: 1px solid rgba(255,184,77,0.2); }
.prio-bassa { background: rgba(0,230,118,0.12);  color: var(--green);  border: 1px solid rgba(0,230,118,0.2); }

.due-label { font-size: 11px; color: var(--text-muted); }
.due-label.od { color: var(--red); font-weight: 600; }
.due-label.td { color: var(--yellow); font-weight: 600; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,15,0.6); backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 16px;
  opacity: 0; pointer-events: none; transition: opacity var(--tr);
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%; max-width: 460px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg), var(--glow-cyan);
  transform: translateY(12px) scale(0.98);
  transition: transform var(--tr);
}
.overlay.open .modal { transform: translateY(0) scale(1); }

.modal-hd {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); }

.modal-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 4px 8px;
  border-radius: 4px; transition: all var(--tr); line-height: 1;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--red); background: rgba(255,77,106,0.08); }

.modal-body { padding: 18px 20px; }
.modal-body p { color: var(--text-mid); line-height: 1.7; }

.modal-ft {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ── FORM ── */
.form-g { margin-bottom: 14px; }

.form-label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 0.8px;
  text-transform: uppercase; margin-bottom: 5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: inherit;
  font-size: 16px; padding: 10px 12px;
  outline: none; transition: all var(--tr); appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--cyan);
  background: rgba(10,10,26,0.8);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
.form-select option { background: var(--bg-card); color: var(--text); }
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── TOAST ── */
.toast-wrap {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 6px; pointer-events: none;
}
.toast {
  background: var(--bg-panel);
  border: 1px solid rgba(0,212,255,0.35);
  border-radius: var(--radius); padding: 11px 16px;
  font-size: 13px; color: var(--text); box-shadow: var(--shadow), var(--glow-cyan);
  animation: tIn 280ms ease forwards; max-width: 280px; line-height: 1.4;
}
.toast.success { border-color: rgba(0,230,118,0.4); box-shadow: var(--shadow), 0 0 10px rgba(0,230,118,0.2); }
.toast.error   { border-color: rgba(255,77,106,0.4); box-shadow: var(--shadow), 0 0 10px rgba(255,77,106,0.2); }
.toast.warning { border-color: rgba(255,184,77,0.4); box-shadow: var(--shadow), 0 0 10px rgba(255,184,77,0.2); }

@keyframes tIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── REPORT BUTTON ── */
.report-btn {
  background: transparent;
  border: 1px solid var(--violet-dim);
  color: var(--violet-mid);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-family: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all var(--tr);
  min-height: 36px; white-space: nowrap;
}
.report-btn:hover { background: rgba(123,47,255,0.08); border-color: var(--violet); color: var(--violet); box-shadow: var(--glow-violet); }

/* ── REPORT MODAL ── */
.report-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;

<script>
// ═══════════════════════════════════════════
// ── MATRIX BACKGROUND ANIMATION ──
// ═══════════════════════════════════════════
(function(){
  var canvas = document.getElementById('matrixCanvas');
  var ctx = canvas.getContext('2d');
  var cells = [];
  var cols, rows, cellSize = 40;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.ceil(canvas.width / cellSize) + 1;
    rows = Math.ceil(canvas.height / cellSize) + 1;
    cells = [];
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        cells.push({ x: c * cellSize, y: r * cellSize, flash: 0 });
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.04)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (var x = 0; x <= canvas.width; x += cellSize) {
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
    }
    for (var y = 0; y <= canvas.height; y += cellSize) {
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();

    // Flash cells
    for (var i = 0; i < cells.length; i++) {
      var cell = cells[i];
      if (cell.flash > 0) {
        ctx.fillStyle = 'rgba(0, 212, 255, ' + (0.12 * cell.flash) + ')';
        ctx.fillRect(cell.x, cell.y, cellSize, cellSize);
        cell.flash -= 0.01;
        if (cell.flash < 0) cell.flash = 0;
      }
    }

    // Random flash
    if (Math.random() < 0.03 && cells.length > 0) {
      var idx = Math.floor(Math.random() * cells.length);
      cells[idx].flash = 1;
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

// ═══════════════════════════════════════════
// ── CLOCK ──
// ═══════════════════════════════════════════
(function(){
  function tick() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var s = String(now.getSeconds()).padStart(2,'0');
    var el = document.getElementById('clock');
    if (el) el.textContent = h + ':' + m + ':' + s;
  }
  tick();
  setInterval(tick, 1000);
})();

// ═══════════════════════════════════════════
// ── STATE ──
// ═══════════════════════════════════════════
var events = JSON.parse(localStorage.getItem('ag_events') || '[]');
var tasks  = JSON.parse(localStorage.getItem('ag_tasks')  || '[]');

var _now     = new Date();
var curYear  = _now.getFullYear();
var curMonth = _now.getMonth();
var selDate  = null;
var activeTab   = 'events';
var taskFilter  = 'all';
var prevAllDone = false;
var todayYMD    = toYMD(_now);

var MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
              'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var WDAYS  = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

// ═══════════════════════════════════════════
// ── UTILS ──
// ═══════════════════════════════════════════
function uid()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toYMD(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtLong(ymd) {
  var p = ymd.split('-').map(Number);
  return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function cap(s)  { return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isOD(y) { return y < todayYMD; }
function isTD(y) { return y === todayYMD; }

function persist() {
  localStorage.setItem('ag_events', JSON.stringify(events));
  localStorage.setItem('ag_tasks',  JSON.stringify(tasks));
  // Sync to Firebase
  if (typeof db !== 'undefined') {
    db.ref('agenda/events').set(events);
    db.ref('agenda/tasks').set(tasks);
  }
}

// ═══════════════════════════════════════════
// ── AUTO-POSTPONE OVERDUE TASKS ──
// ═══════════════════════════════════════════
function getNextWorkday() {
  var d = new Date();
  var day = d.getDay(); // 0=dom, 6=sab
  if (day === 6) d.setDate(d.getDate() + 2); // sab → lun
  else if (day === 0) d.setDate(d.getDate() + 1); // dom → lun
  return toYMD(d);
}

function autoPostpone() {
  var target = getNextWorkday();
  var moved = 0;
  tasks.forEach(function(t) {
    if (!t.completed && isOD(t.date) && !t.postponed) {
      t.postponed = true;
      t.originalDate = t.originalDate || t.date;
      t.date = target;
      moved++;
    }
  });
  if (moved > 0) {
    persist();
    var dayLabel = (target === todayYMD) ? 'oggi' : 'lunedì';
    setTimeout(function(){
      toast('⚡ ' + moved + ' task scadut' + (moved===1?'o':'i') + ' spostati a ' + dayLabel, 'warning', 4000);
    }, 800);
  }
}
autoPostpone();

// ═══════════════════════════════════════════
// ── TOAST ──
// ═══════════════════════════════════════════
function toast(msg, type, ms) {
  ms = ms || 2500;
  var w = document.getElementById('toastWrap');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(function(){
    el.style.transition = '300ms ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-6px)';
    setTimeout(function(){ el.remove(); }, 300);
  }, ms);
}

// ═══════════════════════════════════════════
// ── PROGRESS BAR ──
// ═══════════════════════════════════════════
function updateProgress() {
  var todayTk = tasks.filter(function(t){ return t.date === todayYMD; });
  var total   = todayTk.length;
  var done    = todayTk.filter(function(t){ return t.completed; }).length;
  var fill    = document.getElementById('pFill');
  var text    = document.getElementById('pText');

  if (!total) {
    fill.style.width = '0%';
    fill.classList.remove('all-done');
    text.textContent = 'Nessun task per oggi';
    prevAllDone = false;
    return;
  }

  var pct     = Math.round(done / total * 100);
  var allDone = done === total;
  fill.style.width = pct + '%';
  fill.classList.toggle('all-done', allDone);
  text.textContent = done + ' / ' + total + ' task completati oggi (' + pct + '%)';

  if (allDone && !prevAllDone) toast('🎯 Tutti i task di oggi completati!', 'success', 3500);
  prevAllDone = allDone;
}

// ═══════════════════════════════════════════
// ── CALENDAR ──
// ═══════════════════════════════════════════
function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = MONTHS[curMonth] + ' ' + curYear;
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  WDAYS.forEach(function(d){
    var el = document.createElement('div');
    el.className = 'cal-weekday';
    el.textContent = d;
    grid.appendChild(el);
  });

  var evDates = new Set(events.map(function(e){ return e.date; }));
  var tkMap   = {};
  tasks.forEach(function(t){
    if (!tkMap[t.date]) tkMap[t.date] = {has:true, od:false};
    if (!t.completed && isOD(t.date)) tkMap[t.date].od = true;
  });

  var first  = new Date(curYear, curMonth, 1);
  var offset = first.getDay();
  offset = offset === 0 ? 6 : offset - 1;

  var dim      = new Date(curYear, curMonth+1, 0).getDate();
  var prevDim  = new Date(curYear, curMonth, 0).getDate();
  var total    = Math.ceil((offset + dim) / 7) * 7;

  for (var i = 0; i < total; i++) {
    var el = document.createElement('div');
    el.className = 'cal-day';
    var ymd, num;

    if (i < offset) {
      num = prevDim - offset + i + 1;
      ymd = toYMD(new Date(curYear, curMonth-1, num));
      el.classList.add('other-month');
    } else if (i >= offset + dim) {
      num = i - offset - dim + 1;
      ymd = toYMD(new Date(curYear, curMonth+1, num));
      el.classList.add('other-month');
    } else {
      num = i - offset + 1;
      ymd = toYMD(new Date(curYear, curMonth, num));
    }

    if (ymd === todayYMD) el.classList.add('today');
    if (selDate && ymd === selDate) el.classList.add('selected');

    var numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = num;
    el.appendChild(numEl);

    var hasEv = evDates.has(ymd);
    var tk    = tkMap[ymd];
    if (hasEv || tk) {
      var dots = document.createElement('div');
      dots.className = 'cal-dots';
      if (hasEv) { var d1=document.createElement('div'); d1.className='cal-dot ev'; dots.appendChild(d1); }
      if (tk)    { var d2=document.createElement('div'); d2.className='cal-dot '+(tk.od?'od':'tk'); dots.appendChild(d2); }
      el.appendChild(dots);
    }

    (function(y){ el.addEventListener('click', function(){ selectDay(y); }); })(ymd);
    grid.appendChild(el);
  }
}

// ═══════════════════════════════════════════
// ── SELECT DAY ──
// ═══════════════════════════════════════════
function selectDay(ymd) {
  selDate = ymd;
  renderCalendar();
  renderSidebar();
}

// ═══════════════════════════════════════════
// ── SIDEBAR ──
// ═══════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabEv').classList.toggle('active', tab==='events');
  document.getElementById('tabTk').classList.toggle('active', tab==='tasks');
  renderSidebar();
}

function renderSidebar() {
  var body   = document.getElementById('sideBody');
  var add    = document.getElementById('sideAdd');
  var addBtn = document.getElementById('sideAddBtn');

  if (!selDate) {
    body.innerHTML = '<div class="no-day"><div class="no-day-icon">📆</div><div class="no-day-text">Seleziona un giorno<br>per vedere eventi e task</div></div>';
    add.style.display = 'none';
    return;
  }

  document.getElementById('sideDate').textContent = cap(fmtLong(selDate));
  document.getElementById('sideSub').textContent  = isTD(selDate) ? 'Oggi' : '';
  add.style.display = 'block';

  if (activeTab === 'events') {
    addBtn.textContent = '＋ Aggiungi Evento';
    addBtn.onclick = openEvModal;
    renderEvList(body);
  } else {
    addBtn.textContent = '＋ Aggiungi Task';
    addBtn.onclick = openTkModal;
    renderTkList(body);
  }
}

function renderEvList(container) {
  var day = events
    .filter(function(e){ return e.date === selDate; })
    .sort(function(a,b){ return (a.start||'').localeCompare(b.start||''); });

  if (!day.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">◌</div><div class="empty-text">Nessun evento per questo giorno</div></div>';
    return;
  }

  container.innerHTML = day.map(function(ev){
    return '<div class="event-card cat-'+ev.category+'" onclick="openEditEv(\''+ev.id+'\')">'+
      '<div class="ev-title">'+esc(ev.title)+'</div>'+
      '<div class="ev-meta">'+
        (ev.start ? '<span class="ev-time">'+ev.start+(ev.end?' – '+ev.end:'')+'</span>' : '')+
        '<span class="badge badge-'+ev.category+'">'+ev.category+'</span>'+
      '</div>'+
      (ev.notes ? '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'+esc(ev.notes)+'</div>' : '')+
      '<div class="card-actions">'+
        '<button class="icon-btn" onclick="event.stopPropagation();openEditEv(\''+ev.id+'\')">✎</button>'+
        '<button class="icon-btn del" onclick="event.stopPropagation();deleteEv(\''+ev.id+'\')">✕</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderTkList(container) {
  var all  = tasks.filter(function(t){ return t.date === selDate; });
  var list = taskFilter==='todo' ? all.filter(function(t){ return !t.completed; })
           : taskFilter==='done' ? all.filter(function(t){ return t.completed; })
           : all;

  var html = '<div class="task-filters">'+
    '<button class="filter-pill '+(taskFilter==='all'?'active':'')+'" onclick="setFilter(\'all\')">Tutti</button>'+
    '<button class="filter-pill '+(taskFilter==='todo'?'active':'')+'" onclick="setFilter(\'todo\')">Da fare</button>'+
    '<button class="filter-pill '+(taskFilter==='done'?'active':'')+'" onclick="setFilter(\'done\')">Completati</button>'+
  '</div>';

  if (!list.length) {
    html += '<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">Nessun task qui</div></div>';
  } else {
    html += list.map(function(t){
      var cls = '', dueLbl = '';
      var postponedBadge = '';
      if (t.postponed) {
        postponedBadge = '<span class="badge badge-rimandato">Rimandato</span>';
      }
      if (!t.completed) {
        if (isOD(t.date))      { cls='overdue';   dueLbl='<span class="due-label od">Scaduto</span>'; }
        else if (isTD(t.date)) { cls='due-today'; dueLbl='<span class="due-label td">Scade oggi</span>'; }
      }
      return '<div class="task-card '+(t.completed?'done':cls)+'">'+
        '<div class="task-check '+(t.completed?'checked':'')+'" onclick="toggleTask(\''+t.id+'\')"></div>'+
        '<div class="tk-body">'+
          '<div class="tk-title">'+esc(t.title)+'</div>'+
          '<div class="tk-meta">'+
            '<span class="prio prio-'+t.priority+'">'+t.priority+'</span>'+
            postponedBadge+
            dueLbl+
          '</div>'+
        '</div>'+
        '<div class="card-actions">'+
          '<button class="icon-btn" onclick="openEditTk(\''+t.id+'\')">✎</button>'+
          '<button class="icon-btn del" onclick="deleteTk(\''+t.id+'\')">✕</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  container.innerHTML = html;
}

function setFilter(f) { taskFilter = f; renderSidebar(); }

// ═══════════════════════════════════════════
// ── TOGGLE TASK ──
// ═══════════════════════════════════════════
function toggleTask(id) {
  var t = tasks.find(function(t){ return t.id===id; });
  if (t) { t.completed = !t.completed; persist(); renderCalendar(); renderSidebar(); updateProgress(); }
}

// ═══════════════════════════════════════════
// ── DELETE ──
// ═══════════════════════════════════════════
function deleteEv(id) {
  events = events.filter(function(e){ return e.id!==id; });
  persist(); renderCalendar(); renderSidebar();
  toast('Evento eliminato', 'warning');
}

function deleteTk(id) {
  tasks = tasks.filter(function(t){ return t.id!==id; });
  persist(); renderCalendar(); renderSidebar(); updateProgress();
  toast('Task eliminato', 'warning');
}

// ═══════════════════════════════════════════
// ── EVENT MODAL ──
// ═══════════════════════════════════════════
function openEvModal() {
  document.getElementById('evId').value    = '';
  document.getElementById('evTitle').value = '';
  document.getElementById('evDate').value  = selDate || todayYMD;
  document.getElementById('evStart').value = '';
  document.getElementById('evEnd').value   = '';
  document.getElementById('evCat').value   = 'lavoro';
  document.getElementById('evNotes').value = '';
  document.getElementById('evModalTitle').textContent = 'Nuovo Evento';
  document.getElementById('evDelBtn').style.display   = 'none';
  document.getElementById('evOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('evTitle').focus(); }, 50);
}

function openEditEv(id) {
  var ev = events.find(function(e){ return e.id===id; });
  if (!ev) return;
  document.getElementById('evId').value    = ev.id;
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value  = ev.date;
  document.getElementById('evStart').value = ev.start || '';
  document.getElementById('evEnd').value   = ev.end   || '';
  document.getElementById('evCat').value   = ev.category;
  document.getElementById('evNotes').value = ev.notes || '';
  document.getElementById('evModalTitle').textContent = 'Modifica Evento';
  document.getElementById('evDelBtn').style.display   = 'inline-flex';
  document.getElementById('evOverlay').classList.add('open');
}

function closeEvModal() { document.getElementById('evOverlay').classList.remove('open'); }

function deleteCurrentEv() {
  var id = document.getElementById('evId').value;
  if (id) { deleteEv(id); closeEvModal(); }
}

function saveEv() {
  var title = document.getElementById('evTitle').value.trim();
  var date  = document.getElementById('evDate').value;
  if (!title || !date) { toast('Titolo e data sono obbligatori', 'error'); return; }

  var id = document.getElementById('evId').value;
  var ev = {
    id:       id || uid(),
    title:    title,
    date:     date,
    start:    document.getElementById('evStart').value,
    end:      document.getElementById('evEnd').value,
    category: document.getElementById('evCat').value,
    notes:    document.getElementById('evNotes').value.trim()
  };

  if (id) { var i = events.findIndex(function(e){ return e.id===id; }); events[i] = ev; }
  else events.push(ev);

  persist(); renderCalendar();
  if (selDate === date) renderSidebar();
  closeEvModal();
  toast(id ? '✓ Evento aggiornato' : '✓ Evento aggiunto', 'success');
}

// ═══════════════════════════════════════════
// ── TASK MODAL ──
// ═══════════════════════════════════════════
function openTkModal() {
  document.getElementById('tkId').value    = '';
  document.getElementById('tkTitle').value = '';
  document.getElementById('tkDate').value  = selDate || todayYMD;
  document.getElementById('tkPrio').value  = 'media';
  document.getElementById('tkModalTitle').textContent = 'Nuovo Task';
  document.getElementById('tkDelBtn').style.display   = 'none';
  document.getElementById('tkOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('tkTitle').focus(); }, 50);
}

function openEditTk(id) {
  var t = tasks.find(function(t){ return t.id===id; });
  if (!t) return;
  document.getElementById('tkId').value    = t.id;
  document.getElementById('tkTitle').value = t.title;
  document.getElementById('tkDate').value  = t.date;
  document.getElementById('tkPrio').value  = t.priority;
  document.getElementById('tkModalTitle').textContent = 'Modifica Task';
  document.getElementById('tkDelBtn').style.display   = 'inline-flex';
  document.getElementById('tkOverlay').classList.add('open');
}

function closeTkModal() { document.getElementById('tkOverlay').classList.remove('open'); }

function deleteCurrentTk() {
  var id = document.getElementById('tkId').value;
  if (id) { deleteTk(id); closeTkModal(); }
}

function saveTk() {
  var title = document.getElementById('tkTitle').value.trim();
  var date  = document.getElementById('tkDate').value;
  if (!title || !date) { toast('Titolo e data sono obbligatori', 'error'); return; }

  var id = document.getElementById('tkId').value;
  var existing = id ? tasks.find(function(t){ return t.id===id; }) : null;
  var t = {
    id:        id || uid(),
    title:     title,
    date:      date,
    priority:  document.getElementById('tkPrio').value,
    completed: existing ? existing.completed : false,
    postponed: existing ? existing.postponed : false,
    originalDate: existing ? existing.originalDate : null
  };

  if (id) { var i = tasks.findIndex(function(t){ return t.id===id; }); tasks[i] = t; }
  else tasks.push(t);

  persist(); renderCalendar(); updateProgress();
  if (selDate === date) renderSidebar();
  closeTkModal();
  toast(id ? '✓ Task aggiornato' : '✓ Task aggiunto', 'success');
}

// ═══════════════════════════════════════════
// ── REPORT ──
// ═══════════════════════════════════════════
var reportPlainText = '';

function openReportModal() {
  var todayEv = events.filter(function(e){ return e.date === todayYMD; })
    .sort(function(a,b){ return (a.start||'').localeCompare(b.start||''); });
  var todayTk = tasks.filter(function(t){ return t.date === todayYMD; });
  var done    = todayTk.filter(function(t){ return t.completed; });
  var todo    = todayTk.filter(function(t){ return !t.completed; });
  var postponed = todayTk.filter(function(t){ return t.postponed; });

  var pct = todayTk.length ? Math.round(done.length / todayTk.length * 100) : 0;

  var lines = [];
  lines.push('══════════════════════════════');
  lines.push('  📊 REPORT – ' + cap(fmtLong(todayYMD)));
  lines.push('══════════════════════════════');
  lines.push('');

  // Events
  lines.push('📅 EVENTI (' + todayEv.length + ')');
  if (todayEv.length === 0) {
    lines.push('   Nessun evento oggi');
  } else {
    todayEv.forEach(function(ev){
      var time = ev.start ? ev.start + (ev.end ? '–'+ev.end : '') : 'tutto il giorno';
      lines.push('   • ' + ev.title + ' [' + time + '] (' + ev.category + ')');
    });
  }
  lines.push('');

  // Tasks
  lines.push('✅ TASK (' + done.length + '/' + todayTk.length + ' completati – ' + pct + '%)');
  if (done.length) {
    done.forEach(function(t){ lines.push('   ✓ ' + t.title); });
  }
  if (todo.length) {
    lines.push('');
    lines.push('⏳ DA FARE (' + todo.length + ')');
    todo.forEach(function(t){
      lines.push('   ○ ' + t.title + ' [' + t.priority + ']');
    });
  }
  if (postponed.length) {
    lines.push('');
    lines.push('⚡ RIMANDATI (' + postponed.length + ')');
    postponed.forEach(function(t){
      lines.push('   ↻ ' + t.title + (t.originalDate ? ' (da ' + t.originalDate + ')' : ''));
    });
  }

  lines.push('');
  lines.push('──────────────────────────────');
  lines.push('  Generato da Agenda Personale');

  reportPlainText = lines.join('\n');

  // HTML version with colors
  var html = lines.map(function(l){
    if (l.indexOf('══') > -1 || l.indexOf('──') > -1) return '<span class="rh">' + esc(l) + '</span>';
    if (l.indexOf('📊') > -1 || l.indexOf('📅') > -1) return '<span class="rh">' + esc(l) + '</span>';
    if (l.indexOf('✅') > -1) return '<span class="rg">' + esc(l) + '</span>';
    if (l.indexOf('⏳') > -1) return '<span class="ry">' + esc(l) + '</span>';
    if (l.indexOf('⚡') > -1) return '<span class="rr">' + esc(l) + '</span>';
    if (l.indexOf('✓') > -1) return '<span class="rg">' + esc(l) + '</span>';
    if (l.indexOf('○') > -1) return '<span class="ry">' + esc(l) + '</span>';
    if (l.indexOf('↻') > -1) return '<span class="rv">' + esc(l) + '</span>';
    return esc(l);
  }).join('\n');

  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('reportOverlay').classList.add('open');
}

function closeReportModal() { document.getElementById('reportOverlay').classList.remove('open'); }

function copyReport() {
  navigator.clipboard.writeText(reportPlainText).then(function(){
    toast('📋 Report copiato negli appunti!', 'success');
  }).catch(function(){
    toast('Errore nella copia', 'error');
  });
}

function shareReport() {
  if (navigator.share) {
    navigator.share({
      title: 'Report Agenda – ' + todayYMD,
      text: reportPlainText
    }).catch(function(){});
  } else {
    copyReport();
    toast('📤 Condivisione non supportata, report copiato', 'warning');
  }
}

// ═══════════════════════════════════════════
// ── CLOSE ON BACKDROP / ESC ──
// ═══════════════════════════════════════════
document.getElementById('evOverlay').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeEvModal(); });
document.getElementById('tkOverlay').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeTkModal(); });
document.getElementById('reportOverlay').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeReportModal(); });

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') { closeEvModal(); closeTkModal(); closeReportModal(); }
});

// ═══════════════════════════════════════════
// ── FIREBASE REAL-TIME SYNC ──
// ═══════════════════════════════════════════
var _fbReady = false;
if (typeof db !== 'undefined') {
  // Load initial data from Firebase (overrides localStorage if exists)
  db.ref('agenda').once('value').then(function(snap) {
    var data = snap.val();
    if (data) {
      if (data.events && data.events.length) { events = data.events; localStorage.setItem('ag_events', JSON.stringify(events)); }
      if (data.tasks && data.tasks.length)   { tasks = data.tasks; localStorage.setItem('ag_tasks', JSON.stringify(tasks)); }
      autoPostpone();
      renderCalendar();
      if (selDate) renderSidebar();
      updateProgress();
    }
    _fbReady = true;
  });

  // Listen for real-time changes from other devices
  db.ref('agenda/events').on('value', function(snap) {
    if (!_fbReady) return;
    var d = snap.val();
    if (d && JSON.stringify(d) !== JSON.stringify(events)) {
      events = d;
      localStorage.setItem('ag_events', JSON.stringify(events));
      renderCalendar();
      if (selDate) renderSidebar();
      updateProgress();
    }
  });
  db.ref('agenda/tasks').on('value', function(snap) {
    if (!_fbReady) return;
    var d = snap.val();
    if (d && JSON.stringify(d) !== JSON.stringify(tasks)) {
      tasks = d;
      localStorage.setItem('ag_tasks', JSON.stringify(tasks));
      autoPostpone();
      renderCalendar();
      if (selDate) renderSidebar();
      updateProgress();
    }
  });
}

// ═══════════════════════════════════════════
// ── INIT ──
// ═══════════════════════════════════════════
renderCalendar();
selectDay(todayYMD);
updateProgress();
</script>
