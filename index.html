<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Personale</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #ffffff;
  --bg-soft:      #f5f0ff;
  --bg-hover:     #ede6f7;
  --primary:      #7b2fff;
  --primary-mid:  #a96fff;
  --primary-pale: #d4b8ff;
  --text:         #0d1b4b;
  --text-mid:     #3d4e7a;
  --text-muted:   #8492b4;
  --border:       rgba(123,47,255,0.15);
  --border-act:   rgba(123,47,255,0.4);
  --red:          #dc2626;
  --yellow:       #b45309;
  --green:        #15803d;
  --orange:       #c2410c;
  --shadow:       0 4px 24px rgba(123,47,255,0.08);
  --shadow-lg:    0 8px 40px rgba(123,47,255,0.14);
  --radius:       10px;
  --radius-sm:    6px;
  --tr:           180ms ease;
}

html, body { height: 100%; }

body {
  background: var(--bg-soft);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary-pale); border-radius: 2px; }

/* ── LOCK SCREEN ── */
#lockScreen {
  position: fixed; inset: 0; z-index: 99999;
  background: var(--bg-soft);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 400ms ease;
}
#lockScreen.fade-out { opacity: 0; pointer-events: none; }

.lock-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%; max-width: 340px;
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column; gap: 18px; align-items: center;
}

.lock-logo {
  font-size: 20px; font-weight: 700;
  color: var(--primary); letter-spacing: 1px;
}

.lock-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: -6px; }

.lock-input {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: inherit;
  font-size: 15px; padding: 11px 14px;
  outline: none; text-align: center; letter-spacing: 2px;
  transition: border-color var(--tr), box-shadow var(--tr);
}
.lock-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(123,47,255,0.1); }

.lock-btn {
  width: 100%; padding: 11px;
  background: var(--primary); border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background var(--tr);
}
.lock-btn:hover { background: #5b21b6; }

.lock-err { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }

/* ── HEADER ── */
.app-header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--border), 0 2px 12px rgba(123,47,255,0.05);
}

.app-title { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: 0.3px; }

.header-right { display: flex; gap: 8px; align-items: center; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--primary);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--tr); white-space: nowrap;
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-act); }

.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #5b21b6; border-color: #5b21b6; }

.btn-ghost { background: transparent; border-color: rgba(13,27,75,0.15); color: var(--text-mid); }
.btn-ghost:hover { background: rgba(13,27,75,0.05); border-color: rgba(13,27,75,0.25); color: var(--text); }

.btn-danger { background: transparent; border-color: rgba(220,38,38,0.25); color: var(--red); }
.btn-danger:hover { background: rgba(220,38,38,0.07); border-color: var(--red); }

.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 6px 10px; font-size: 15px; }

/* ── LAYOUT ── */
.app-body {
  display: grid;
  grid-template-columns: 1fr 320px;
  height: calc(100vh - 60px);
}

/* ── CALENDAR ── */
.cal-section { padding: 24px; overflow-y: auto; background: var(--bg-soft); }

.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}

.cal-title { font-size: 20px; font-weight: 700; color: var(--text); text-transform: capitalize; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }

.cal-weekday {
  text-align: center; font-size: 11px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;
  padding: 8px 0;
}

.cal-day {
  position: relative; aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid transparent; border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--tr);
  gap: 3px; min-height: 52px; background: var(--bg);
}
.cal-day:hover { background: var(--bg-hover); border-color: var(--border); }
.cal-day.other-month { opacity: 0.38; background: transparent; }
.cal-day.today { background: rgba(123,47,255,0.07); border-color: var(--primary); }
.cal-day.today .cal-day-num { color: var(--primary); font-weight: 700; }
.cal-day.selected { background: var(--primary); border-color: var(--primary); box-shadow: 0 2px 12px rgba(123,47,255,0.3); }
.cal-day.selected .cal-day-num { color: #fff; font-weight: 700; }

.cal-day-num { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1; }

.cal-dots { display: flex; gap: 3px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }
.cal-dot.ev  { background: var(--primary-mid); }
.cal-dot.tk  { background: var(--primary); }
.cal-dot.od  { background: var(--red); }
.cal-day.selected .cal-dot { background: rgba(255,255,255,0.65); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--bg);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}

.sidebar-hd { padding: 18px 16px 0; flex-shrink: 0; }

.side-date {
  font-size: 15px; font-weight: 700; color: var(--text);
  margin-bottom: 2px; text-transform: capitalize;
}
.side-sub {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
  min-height: 16px;
}

.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }

.tab-btn {
  flex: 1; padding: 10px;
  background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: inherit; font-size: 12px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  cursor: pointer; transition: all var(--tr); margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); background: var(--bg-soft); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

.sidebar-body { flex: 1; overflow-y: auto; padding: 14px 14px 80px; }

.sidebar-add {
  position: sticky; bottom: 0;
  background: var(--bg); padding: 10px 14px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-add .btn { width: 100%; justify-content: center; }

/* ── EMPTY / NO DAY ── */
.no-day, .empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 28px 12px; color: var(--text-muted); gap: 8px;
}
.no-day { height: 100%; }
.no-day-icon, .empty-icon { font-size: 32px; opacity: 0.3; }
.no-day-text, .empty-text { font-size: 13px; line-height: 1.6; }

/* ── EVENT CARD ── */
.event-card {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary-mid);
  border-radius: var(--radius);
  padding: 11px 12px; margin-bottom: 8px;
  cursor: pointer; transition: all var(--tr);
  position: relative; overflow: hidden;
}
.event-card:hover { border-color: var(--border-act); border-left-color: var(--primary); background: var(--bg-hover); }
.event-card.cat-lavoro     { border-left-color: var(--primary); }
.event-card.cat-personale  { border-left-color: var(--primary-mid); }
.event-card.cat-salute     { border-left-color: var(--green); }
.event-card.cat-altro      { border-left-color: var(--orange); }

.ev-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ev-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ev-time  { font-size: 12px; color: var(--primary); font-weight: 500; }

.badge {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.badge-lavoro    { background: rgba(123,47,255,0.1);  color: #5b21b6; }
.badge-personale { background: rgba(169,111,255,0.15); color: var(--primary); }
.badge-salute    { background: rgba(21,128,61,0.1);   color: var(--green); }
.badge-altro     { background: rgba(194,65,12,0.1);   color: var(--orange); }

.card-actions {
  position: absolute; top: 8px; right: 8px;
  display: flex; gap: 3px;
  opacity: 0; transition: opacity var(--tr);
}
.event-card:hover .card-actions,
.task-card:hover  .card-actions { opacity: 1; }

.icon-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 13px; padding: 3px 5px;
  border-radius: 4px; transition: all var(--tr); line-height: 1;
}
.icon-btn:hover     { color: var(--primary); background: var(--bg-hover); }
.icon-btn.del:hover { color: var(--red); background: rgba(220,38,38,0.08); }

/* ── TASK CARD ── */
.task-filters { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }

.filter-pill {
  padding: 4px 10px;
  border: 1px solid rgba(13,27,75,0.15);
  border-radius: 20px; background: transparent;
  color: var(--text-muted);
  font-family: inherit; font-size: 11px; font-weight: 600;
  letter-spacing: 0.6px; text-transform: uppercase;
  cursor: pointer; transition: all var(--tr);
}
.filter-pill:hover { border-color: var(--border-act); color: var(--text); }
.filter-pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }

.task-card {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 12px; margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: all var(--tr); position: relative;
}
.task-card:hover { border-color: var(--border-act); }
.task-card.overdue   { border-color: rgba(220,38,38,0.3);  background: rgba(220,38,38,0.03); }
.task-card.due-today { border-color: rgba(180,83,9,0.3);   background: rgba(180,83,9,0.03); }
.task-card.done      { opacity: 0.5; }
.task-card.done .tk-title { text-decoration: line-through; color: var(--text-muted); }

.task-check {
  width: 18px; height: 18px; flex-shrink: 0;
  border: 2px solid var(--border-act); border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--tr); margin-top: 1px;
}
.task-check:hover { border-color: var(--primary); background: var(--bg-hover); }
.task-check.checked { background: var(--primary); border-color: var(--primary); }
.task-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

.tk-body  { flex: 1; min-width: 0; }
.tk-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; transition: color var(--tr); }
.tk-meta  { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

.prio {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.prio-alta  { background: rgba(220,38,38,0.1);  color: #dc2626; border: 1px solid rgba(220,38,38,0.2); }
.prio-media { background: rgba(180,83,9,0.1);   color: #b45309; border: 1px solid rgba(180,83,9,0.2); }
.prio-bassa { background: rgba(21,128,61,0.1);  color: #15803d; border: 1px solid rgba(21,128,61,0.2); }

.due-label { font-size: 11px; color: var(--text-muted); }
.due-label.od { color: var(--red); font-weight: 600; }
.due-label.td { color: var(--yellow); font-weight: 600; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(13,27,75,0.3); backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 16px;
  opacity: 0; pointer-events: none; transition: opacity var(--tr);
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%; max-width: 460px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(12px) scale(0.98);
  transition: transform var(--tr);
}
.overlay.open .modal { transform: translateY(0) scale(1); }

.modal-hd {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); }

.modal-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 2px 6px;
  border-radius: 4px; transition: all var(--tr); line-height: 1;
}
.modal-close:hover { color: var(--red); background: rgba(220,38,38,0.08); }

.modal-body { padding: 18px 20px; }
.modal-body p { color: var(--text-mid); line-height: 1.7; }

.modal-ft {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ── FORM ── */
.form-g { margin-bottom: 14px; }

.form-label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 0.8px;
  text-transform: uppercase; margin-bottom: 5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: inherit;
  font-size: 14px; padding: 9px 11px;
  outline: none; transition: all var(--tr); appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary);
  background: var(--bg);
  box-shadow: 0 0 0 3px rgba(123,47,255,0.1);
}
.form-input::placeholder, .form-textarea::placeholder { color: rgba(13,27,75,0.3); }
.form-select option { background: var(--bg); color: var(--text); }
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── TOAST ── */
.toast-wrap {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 6px; pointer-events: none;
}
.toast {
  background: #fff; border: 1px solid rgba(123,47,255,0.35);
  border-radius: var(--radius); padding: 11px 16px;
  font-size: 13px; color: var(--text); box-shadow: var(--shadow);
  animation: tIn 280ms ease forwards; max-width: 280px; line-height: 1.4;
}
.toast.success { border-color: rgba(21,128,61,0.4); }
.toast.error   { border-color: rgba(220,38,38,0.4); }
.toast.warning { border-color: rgba(180,83,9,0.4); }

@keyframes tIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  position: relative; z-index: 9; flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 6px 24px;
  display: flex; align-items: center; gap: 12px;
}
.progress-track {
  flex: 1; height: 5px;
  background: rgba(123,47,255,0.08);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--primary-mid), var(--primary));
  border-radius: 3px;
  transition: width 500ms ease;
}
.progress-fill.all-done { background: #5b21b6; }
.progress-text { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 160px; text-align: right; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .app-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
  .sidebar  { border-left: none; border-top: 1px solid var(--border); height: 52vh; }
  .cal-section { height: auto; }
  .app-header { padding: 0 14px; }
  .cal-day { min-height: 44px; }
  .progress-bar-wrap { padding: 6px 14px; }
}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">📅 Agenda Personale</div>
    <div class="lock-sub">Inserisci la password per accedere</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')checkPass()">
    <button class="lock-btn" onclick="checkPass()">Accedi</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<script>
(function(){
  var P = 'Gabriel2003?';
  if(sessionStorage.getItem('ag_auth')==='1'){
    document.getElementById('lockScreen').style.display='none';
  }
  window.checkPass = function(){
    if(document.getElementById('lockInput').value === P){
      sessionStorage.setItem('ag_auth','1');
      var ls = document.getElementById('lockScreen');
      ls.classList.add('fade-out');
      setTimeout(function(){ ls.style.display='none'; }, 400);
    } else {
      document.getElementById('lockErr').textContent = 'Password errata. Riprova.';
      document.getElementById('lockInput').value = '';
      document.getElementById('lockInput').focus();
    }
  };
})();
</script>

<!-- HEADER -->
<header class="app-header">
  <div class="app-title">📅 Agenda Personale</div>
  <div class="header-right">
    <button class="btn btn-sm" onclick="openEvModal()">＋ Evento</button>
    <button class="btn btn-primary btn-sm" onclick="openTkModal()">＋ Task</button>
  </div>
</header>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="pFill"></div></div>
  <div class="progress-text" id="pText">Nessun task per oggi</div>
</div>

<!-- MAIN -->
<div class="app-body">

  <!-- CALENDAR -->
  <div class="cal-section">
    <div class="cal-nav">
      <button class="btn btn-ghost btn-icon" onclick="changeMonth(-1)">&#8592;</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="btn btn-ghost btn-icon" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-hd">
      <div class="side-date" id="sideDate">Seleziona un giorno</div>
      <div class="side-sub"  id="sideSub">← clicca sul calendario</div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tabEv" onclick="switchTab('events')">Eventi</button>
        <button class="tab-btn"        id="tabTk" onclick="switchTab('tasks')">Task</button>
      </div>
    </div>
    <div class="sidebar-body" id="sideBody">
      <div class="no-day">
        <div class="no-day-icon">📆</div>
        <div class="no-day-text">Seleziona un giorno<br>per vedere eventi e task</div>
      </div>
    </div>
    <div class="sidebar-add" id="sideAdd" style="display:none">
      <button class="btn" id="sideAddBtn">＋ Aggiungi</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- EVENT MODAL -->
<div class="overlay" id="evOverlay">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="evModalTitle">Nuovo Evento</div>
      <button class="modal-close" onclick="closeEvModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="evId">
      <div class="form-g">
        <label class="form-label">Titolo *</label>
        <input type="text" class="form-input" id="evTitle" placeholder="Nome evento...">
      </div>
      <div class="form-row">
        <div class="form-g">
          <label class="form-label">Data *</label>
          <input type="date" class="form-input" id="evDate">
        </div>
        <div class="form-g">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="evCat">
            <option value="lavoro">Lavoro</option>
            <option value="personale">Personale</option>
            <option value="salute">Salute</option>
            <option value="altro">Altro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-g">
          <label class="form-label">Ora inizio</label>
          <input type="time" class="form-input" id="evStart">
        </div>
        <div class="form-g">
          <label class="form-label">Ora fine</label>
          <input type="time" class="form-input" id="evEnd">
        </div>
      </div>
      <div class="form-g">
        <label class="form-label">Note</label>
        <textarea class="form-textarea" id="evNotes" placeholder="Note opzionali..."></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeEvModal()">Annulla</button>
      <button class="btn btn-danger btn-sm" id="evDelBtn" onclick="deleteCurrentEv()" style="display:none">Elimina</button>
      <button class="btn btn-primary" onclick="saveEv()">Salva</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="tkOverlay">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="tkModalTitle">Nuovo Task</div>
      <button class="modal-close" onclick="closeTkModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="tkId">
      <div class="form-g">
        <label class="form-label">Titolo *</label>
        <input type="text" class="form-input" id="tkTitle" placeholder="Cosa devi fare...">
      </div>
      <div class="form-row">
        <div class="form-g">
          <label class="form-label">Scadenza *</label>
          <input type="date" class="form-input" id="tkDate">
        </div>
        <div class="form-g">
          <label class="form-label">Priorità</label>
          <select class="form-select" id="tkPrio">
            <option value="alta">Alta</option>
            <option value="media" selected>Media</option>
            <option value="bassa">Bassa</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeTkModal()">Annulla</button>
      <button class="btn btn-danger btn-sm" id="tkDelBtn" onclick="deleteCurrentTk()" style="display:none">Elimina</button>
      <button class="btn btn-primary" onclick="saveTk()">Salva</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let events = JSON.parse(localStorage.getItem('ag_events') || '[]');
let tasks  = JSON.parse(localStorage.getItem('ag_tasks')  || '[]');

const _now   = new Date();
let curYear  = _now.getFullYear();
let curMonth = _now.getMonth();
let selDate  = null;
let activeTab   = 'events';
let taskFilter  = 'all';
let prevAllDone = false;
const todayYMD  = toYMD(_now);

const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const WDAYS  = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

// ── UTILS ──
function uid()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toYMD(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtLong(ymd) {
  const [y,m,d] = ymd.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function cap(s)  { return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isOD(y) { return y < todayYMD; }
function isTD(y) { return y === todayYMD; }

function persist() {
  localStorage.setItem('ag_events', JSON.stringify(events));
  localStorage.setItem('ag_tasks',  JSON.stringify(tasks));
}

// ── TOAST ──
function toast(msg, type, ms) {
  ms = ms || 2500;
  var w = document.getElementById('toastWrap');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(function(){
    el.style.transition = '300ms ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-6px)';
    setTimeout(function(){ el.remove(); }, 300);
  }, ms);
}

// ── PROGRESS BAR ──
function updateProgress() {
  var todayTk = tasks.filter(function(t){ return t.date === todayYMD; });
  var total   = todayTk.length;
  var done    = todayTk.filter(function(t){ return t.completed; }).length;
  var fill    = document.getElementById('pFill');
  var text    = document.getElementById('pText');

  if (!total) {
    fill.style.width = '0%';
    fill.classList.remove('all-done');
    text.textContent = 'Nessun task per oggi';
    prevAllDone = false;
    return;
  }

  var pct     = Math.round(done / total * 100);
  var allDone = done === total;
  fill.style.width = pct + '%';
  fill.classList.toggle('all-done', allDone);
  text.textContent = done + ' / ' + total + ' task completati oggi';

  if (allDone && !prevAllDone) toast('🎯 Tutti i task di oggi completati!', 'success', 3000);
  prevAllDone = allDone;
}

// ── CALENDAR ──
function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = MONTHS[curMonth] + ' ' + curYear;
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  WDAYS.forEach(function(d){
    var el = document.createElement('div');
    el.className = 'cal-weekday';
    el.textContent = d;
    grid.appendChild(el);
  });

  var evDates = new Set(events.map(function(e){ return e.date; }));
  var tkMap   = {};
  tasks.forEach(function(t){
    if (!tkMap[t.date]) tkMap[t.date] = {has:true, od:false};
    if (!t.completed && isOD(t.date)) tkMap[t.date].od = true;
  });

  var first  = new Date(curYear, curMonth, 1);
  var offset = first.getDay();
  offset = offset === 0 ? 6 : offset - 1;

  var dim      = new Date(curYear, curMonth+1, 0).getDate();
  var prevDim  = new Date(curYear, curMonth, 0).getDate();
  var total    = Math.ceil((offset + dim) / 7) * 7;

  for (var i = 0; i < total; i++) {
    var el = document.createElement('div');
    el.className = 'cal-day';
    var ymd, num;

    if (i < offset) {
      num = prevDim - offset + i + 1;
      ymd = toYMD(new Date(curYear, curMonth-1, num));
      el.classList.add('other-month');
    } else if (i >= offset + dim) {
      num = i - offset - dim + 1;
      ymd = toYMD(new Date(curYear, curMonth+1, num));
      el.classList.add('other-month');
    } else {
      num = i - offset + 1;
      ymd = toYMD(new Date(curYear, curMonth, num));
    }

    if (ymd === todayYMD) el.classList.add('today');
    if (selDate && ymd === selDate) el.classList.add('selected');

    var numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = num;
    el.appendChild(numEl);

    var hasEv = evDates.has(ymd);
    var tk    = tkMap[ymd];
    if (hasEv || tk) {
      var dots = document.createElement('div');
      dots.className = 'cal-dots';
      if (hasEv) { var d1=document.createElement('div'); d1.className='cal-dot ev'; dots.appendChild(d1); }
      if (tk)    { var d2=document.createElement('div'); d2.className='cal-dot '+(tk.od?'od':'tk'); dots.appendChild(d2); }
      el.appendChild(dots);
    }

    (function(y){ el.addEventListener('click', function(){ selectDay(y); }); })(ymd);
    grid.appendChild(el);
  }
}

// ── SELECT DAY ──
function selectDay(ymd) {
  selDate = ymd;
  renderCalendar();
  renderSidebar();
}

// ── SIDEBAR ──
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabEv').classList.toggle('active', tab==='events');
  document.getElementById('tabTk').classList.toggle('active', tab==='tasks');
  renderSidebar();
}

function renderSidebar() {
  var body   = document.getElementById('sideBody');
  var add    = document.getElementById('sideAdd');
  var addBtn = document.getElementById('sideAddBtn');

  if (!selDate) {
    body.innerHTML = '<div class="no-day"><div class="no-day-icon">📆</div><div class="no-day-text">Seleziona un giorno<br>per vedere eventi e task</div></div>';
    add.style.display = 'none';
    return;
  }

  document.getElementById('sideDate').textContent = cap(fmtLong(selDate));
  document.getElementById('sideSub').textContent  = isTD(selDate) ? 'Oggi' : '';
  add.style.display = 'block';

  if (activeTab === 'events') {
    addBtn.textContent = '＋ Aggiungi Evento';
    addBtn.onclick = openEvModal;
    renderEvList(body);
  } else {
    addBtn.textContent = '＋ Aggiungi Task';
    addBtn.onclick = openTkModal;
    renderTkList(body);
  }
}

function renderEvList(container) {
  var day = events
    .filter(function(e){ return e.date === selDate; })
    .sort(function(a,b){ return (a.start||'').localeCompare(b.start||''); });

  if (!day.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">◌</div><div class="empty-text">Nessun evento per questo giorno</div></div>';
    return;
  }

  container.innerHTML = day.map(function(ev){
    return '<div class="event-card cat-'+ev.category+'" onclick="openEditEv(\''+ev.id+'\')">'+
      '<div class="ev-title">'+esc(ev.title)+'</div>'+
      '<div class="ev-meta">'+
        (ev.start ? '<span class="ev-time">'+ev.start+(ev.end?' – '+ev.end:'')+'</span>' : '')+
        '<span class="badge badge-'+ev.category+'">'+ev.category+'</span>'+
      '</div>'+
      (ev.notes ? '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'+esc(ev.notes)+'</div>' : '')+
      '<div class="card-actions">'+
        '<button class="icon-btn" onclick="event.stopPropagation();openEditEv(\''+ev.id+'\')">✎</button>'+
        '<button class="icon-btn del" onclick="event.stopPropagation();deleteEv(\''+ev.id+'\')">✕</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderTkList(container) {
  var all  = tasks.filter(function(t){ return t.date === selDate; });
  var list = taskFilter==='todo' ? all.filter(function(t){ return !t.completed; })
           : taskFilter==='done' ? all.filter(function(t){ return t.completed; })
           : all;

  var html = '<div class="task-filters">'+
    '<button class="filter-pill '+(taskFilter==='all'?'active':'')+'" onclick="setFilter(\'all\')">Tutti</button>'+
    '<button class="filter-pill '+(taskFilter==='todo'?'active':'')+'" onclick="setFilter(\'todo\')">Da fare</button>'+
    '<button class="filter-pill '+(taskFilter==='done'?'active':'')+'" onclick="setFilter(\'done\')">Completati</button>'+
  '</div>';

  if (!list.length) {
    html += '<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">Nessun task qui</div></div>';
  } else {
    html += list.map(function(t){
      var cls = '', dueLbl = '';
      if (!t.completed) {
        if (isOD(t.date))      { cls='overdue';   dueLbl='<span class="due-label od">Scaduto</span>'; }
        else if (isTD(t.date)) { cls='due-today'; dueLbl='<span class="due-label td">Scade oggi</span>'; }
      }
      return '<div class="task-card '+(t.completed?'done':cls)+'">'+
        '<div class="task-check '+(t.completed?'checked':'')+'" onclick="toggleTask(\''+t.id+'\')"></div>'+
        '<div class="tk-body">'+
          '<div class="tk-title">'+esc(t.title)+'</div>'+
          '<div class="tk-meta">'+
            '<span class="prio prio-'+t.priority+'">'+t.priority+'</span>'+
            dueLbl+
          '</div>'+
        '</div>'+
        '<div class="card-actions">'+
          '<button class="icon-btn" onclick="openEditTk(\''+t.id+'\')">✎</button>'+
          '<button class="icon-btn del" onclick="deleteTk(\''+t.id+'\')">✕</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  container.innerHTML = html;
}

function setFilter(f) { taskFilter = f; renderSidebar(); }

// ── TOGGLE TASK ──
function toggleTask(id) {
  var t = tasks.find(function(t){ return t.id===id; });
  if (t) { t.completed = !t.completed; persist(); renderCalendar(); renderSidebar(); updateProgress(); }
}

// ── DELETE ──
function deleteEv(id) {
  events = events.filter(function(e){ return e.id!==id; });
  persist(); renderCalendar(); renderSidebar();
  toast('Evento eliminato', 'warning');
}

function deleteTk(id) {
  tasks = tasks.filter(function(t){ return t.id!==id; });
  persist(); renderCalendar(); renderSidebar(); updateProgress();
  toast('Task eliminato', 'warning');
}

// ── EVENT MODAL ──
function openEvModal() {
  document.getElementById('evId').value    = '';
  document.getElementById('evTitle').value = '';
  document.getElementById('evDate').value  = selDate || todayYMD;
  document.getElementById('evStart').value = '';
  document.getElementById('evEnd').value   = '';
  document.getElementById('evCat').value   = 'lavoro';
  document.getElementById('evNotes').value = '';
  document.getElementById('evModalTitle').textContent = 'Nuovo Evento';
  document.getElementById('evDelBtn').style.display   = 'none';
  document.getElementById('evOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('evTitle').focus(); }, 50);
}

function openEditEv(id) {
  var ev = events.find(function(e){ return e.id===id; });
  if (!ev) return;
  document.getElementById('evId').value    = ev.id;
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value  = ev.date;
  document.getElementById('evStart').value = ev.start || '';
  document.getElementById('evEnd').value   = ev.end   || '';
  document.getElementById('evCat').value   = ev.category;
  document.getElementById('evNotes').value = ev.notes || '';
  document.getElementById('evModalTitle').textContent = 'Modifica Evento';
  document.getElementById('evDelBtn').style.display   = 'inline-flex';
  document.getElementById('evOverlay').classList.add('open');
}

function closeEvModal() { document.getElementById('evOverlay').classList.remove('open'); }

function deleteCurrentEv() {
  var id = document.getElementById('evId').value;
  if (id) { deleteEv(id); closeEvModal(); }
}

function saveEv() {
  var title = document.getElementById('evTitle').value.trim();
  var date  = document.getElementById('evDate').value;
  if (!title || !date) { toast('Titolo e data sono obbligatori', 'error'); return; }

  var id = document.getElementById('evId').value;
  var ev = {
    id:       id || uid(),
    title:    title,
    date:     date,
    start:    document.getElementById('evStart').value,
    end:      document.getElementById('evEnd').value,
    category: document.getElementById('evCat').value,
    notes:    document.getElementById('evNotes').value.trim()
  };

  if (id) { var i = events.findIndex(function(e){ return e.id===id; }); events[i] = ev; }
  else events.push(ev);

  persist(); renderCalendar();
  if (selDate === date) renderSidebar();
  closeEvModal();
  toast(id ? '✓ Evento aggiornato' : '✓ Evento aggiunto', 'success');
}

// ── TASK MODAL ──
function openTkModal() {
  document.getElementById('tkId').value    = '';
  document.getElementById('tkTitle').value = '';
  document.getElementById('tkDate').value  = selDate || todayYMD;
  document.getElementById('tkPrio').value  = 'media';
  document.getElementById('tkModalTitle').textContent = 'Nuovo Task';
  document.getElementById('tkDelBtn').style.display   = 'none';
  document.getElementById('tkOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('tkTitle').focus(); }, 50);
}

function openEditTk(id) {
  var t = tasks.find(function(t){ return t.id===id; });
  if (!t) return;
  document.getElementById('tkId').value    = t.id;
  document.getElementById('tkTitle').value = t.title;
  document.getElementById('tkDate').value  = t.date;
  document.getElementById('tkPrio').value  = t.priority;
  document.getElementById('tkModalTitle').textContent = 'Modifica Task';
  document.getElementById('tkDelBtn').style.display   = 'inline-flex';
  document.getElementById('tkOverlay').classList.add('open');
}

function closeTkModal() { document.getElementById('tkOverlay').classList.remove('open'); }

function deleteCurrentTk() {
  var id = document.getElementById('tkId').value;
  if (id) { deleteTk(id); closeTkModal(); }
}

function saveTk() {
  var title = document.getElementById('tkTitle').value.trim();
  var date  = document.getElementById('tkDate').value;
  if (!title || !date) { toast('Titolo e data sono obbligatori', 'error'); return; }

  var id = document.getElementById('tkId').value;
  var t = {
    id:        id || uid(),
    title:     title,
    date:      date,
    priority:  document.getElementById('tkPrio').value,
    completed: id ? (tasks.find(function(t){ return t.id===id; })||{}).completed||false : false
  };

  if (id) { var i = tasks.findIndex(function(t){ return t.id===id; }); tasks[i] = t; }
  else tasks.push(t);

  persist(); renderCalendar(); updateProgress();
  if (selDate === date) renderSidebar();
  closeTkModal();
  toast(id ? '✓ Task aggiornato' : '✓ Task aggiunto', 'success');
}

// ── CLOSE ON BACKDROP ──
document.getElementById('evOverlay').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeEvModal(); });
document.getElementById('tkOverlay').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeTkModal(); });

// ── ESC KEY ──
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') { closeEvModal(); closeTkModal(); }
});

// ── INIT ──
renderCalendar();
selectDay(todayYMD);
updateProgress();
</script>
</body>
</html>
